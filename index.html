<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBA - Assignment Information Pages - Reading Summaries - Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F5F0;
      --surface: #FFFFFF;
      --ink: #1A1916;
      --ink2: #4A4840;
      --ink3: #8A877E;
      --accent: #C23B22;
      --border: #E2DED6;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 48px;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }
    .page { max-width: 640px; margin: 0 auto; }
    .header {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 2px solid var(--ink);
    }
    .eyebrow {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 8px;
    }
    .title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .title span { color: var(--accent); }
    .links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      display: block;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .links a:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(194, 59, 34, 0.12);
    }
    .links .label { color: var(--ink2); font-size: 12px; margin-top: 4px; }
    .sections { display: flex; flex-direction: column; gap: 16px; }
    .section-card {
      display: block;
      padding: 24px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .section-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(194, 59, 34, 0.12);
    }
    .section-card .code {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .section-card .hint { color: var(--ink3); font-size: 12px; }

    @media (max-width: 768px) {
      body { padding: 24px; }
      .header { margin-bottom: 28px; padding-bottom: 18px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <p class="eyebrow">MBA</p>
      <h1 class="title">MBA — Assignment Information Pages — Reading Summaries — Notes</h1>
    </header>
    <nav class="sections">
      <a href="library.html?subject=DMBA6004" class="section-card">
        <span class="code">DMBA 6004</span>
        <span class="hint">View library →</span>
      </a>
      <a href="library.html?subject=DMBA6002" class="section-card">
        <span class="code">DMBA 6002</span>
        <span class="hint">View library →</span>
      </a>
      <a href="library.html?subject=DMBA6001" class="section-card">
        <span class="code">DMBA 6001</span>
        <span class="hint">View library →</span>
      </a>
    </nav>
  </div>
</body>
</html>
